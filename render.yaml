services:
  - type: web
    name: ilmora
    runtime: docker
    plan: starter
    envVars:
      - key: PROJECT_NAME
        value: "ILMORA"
      - key: API_V1_STR
        value: "/api/v1"
      - key: MAX_UPLOAD_SIZE
        value: "5242880"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      # Frontend client environment variables (automatically passed as docker build arguments)
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: VITE_API_URL
        value: "/api/v1"
